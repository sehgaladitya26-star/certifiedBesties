<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bestie Unwrapped — the tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Space+Grotesk:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE7D8;
    --paper2:#E6DFCC;
    --ink:#31302B;
    --ink-soft:#5b5949;
    --gold:#B8912C;
    --gold-soft:#E4C766;
    --brick:#8B4A3D;
    --brick-soft:#C98A78;
    --sage:#6E7C5B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);overflow:hidden;font-family:'Space Grotesk',sans-serif;color:var(--ink);}
  body{
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.35), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(0,0,0,0.04), transparent 45%);
  }
  #stage{position:fixed;inset:0; touch-action:none;}
  svg{width:100%;height:100%;display:block;cursor:grab; touch-action:none;}
  svg:active{cursor:grabbing;}

  .hud{
    position:fixed; top:0; left:0; right:0;
    display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start;
    padding:18px 24px; pointer-events:none; z-index:10; gap:8px 16px;
  }
  .brand{
    line-height:1.15;
  }
  .brand-logo{ display:block; height:62px; width:auto; }
  .brand small{display:block; font-family:'Space Grotesk',sans-serif; font-size:10.5px; font-weight:500; color:var(--ink-soft); letter-spacing:1.2px; text-transform:uppercase; margin-top:4px; white-space:nowrap;}

  .breadcrumb{
    pointer-events:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    font-size:14px; color:var(--ink-soft);
  }
  .crumb-btn{
    pointer-events:auto; cursor:pointer; background:var(--paper2); border:1.5px solid var(--ink);
    border-radius:20px; padding:6px 14px; font-family:'Space Grotesk',sans-serif; font-weight:500;
    font-size:13px; color:var(--ink); transition:transform .15s ease, background .15s ease;
    box-shadow:2px 2px 0 rgba(49,48,43,0.15); white-space:nowrap;
  }
  .crumb-btn:hover{transform:translate(-1px,-1px); background:#F2EDDF;}
  .crumb-btn:active{transform:translate(1px,1px); box-shadow:0 0 0 rgba(0,0,0,0);}
  .crumb-sep{color:var(--ink-soft); opacity:.6;}
  .crumb-current{font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:44vw;}

  .hint{
    flex-basis:100%; order:3;
    font-family:'Kalam',cursive; font-size:14px; color:var(--ink-soft);
    pointer-events:none; opacity:0; transition:opacity .4s ease; text-align:center;
  }
  .hint.show{opacity:1;}

  @media (max-width:640px){
    .hud{ padding:14px 16px; }
    .brand-logo{ height:44px; }
    .brand small{ font-size:9.5px; }
    .crumb-btn{ padding:5px 11px; font-size:12px; }
    .hint{ font-size:12.5px; }
  }

  .backdrop{
    position:fixed; inset:0; z-index:15; background:rgba(49,48,43,0.28);
    opacity:0; pointer-events:none; transition:opacity .35s ease;
  }
  .backdrop.show{opacity:1; pointer-events:auto;}
  #stage{ transition: filter .35s ease; }
  #stage.blurred{ filter: blur(7px) saturate(0.9); }

  .modal-wrap{
    position:fixed; inset:0; z-index:16; display:flex; align-items:center; justify-content:center;
    padding:24px; pointer-events:none; opacity:0; transition:opacity .3s ease;
  }
  .modal-wrap.show{opacity:1; pointer-events:auto;}
  .chat-modal{
    background:var(--paper2); border:2.5px solid var(--ink); border-radius:22px 22px 22px 6px;
    width:min(480px, 100%); max-height:min(640px, 88vh); display:flex; flex-direction:column;
    box-shadow:6px 6px 0 rgba(49,48,43,0.18);
    transform:scale(0.85) translateY(18px); transition:transform .3s ease;
  }
  .modal-wrap.show .chat-modal{ transform:scale(1) translateY(0); }
  .chat-header{
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:18px 18px 12px 20px; border-bottom:2px solid rgba(49,48,43,0.15);
  }
  .chat-header-title{font-family:'Playfair Display', serif; font-weight:700; font-size:21px; color:var(--ink); line-height:1.25;}
  .chat-header-sub{font-family:'Space Grotesk',sans-serif; font-size:12px; color:var(--ink-soft); margin-top:3px;}
  .chat-close{
    cursor:pointer; width:34px; height:34px; border-radius:50%; border:2px solid var(--ink);
    background:var(--paper); display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-size:16px; color:var(--ink); flex-shrink:0;
    transition:transform .15s ease, background .15s ease; margin-left:12px;
  }
  .chat-close:hover{ transform:rotate(90deg); background:#F2EDDF; }
  .chat-body{
    flex:1; overflow-y:auto; padding:18px 20px; display:flex; flex-direction:column; gap:10px;
  }
  .chat-bubble-row{ display:flex; flex-direction:column; max-width:78%; }
  .chat-bubble-row.me{ align-self:flex-end; align-items:flex-end; }
  .chat-bubble-row.them{ align-self:flex-start; align-items:flex-start; }
  .chat-sender{ font-family:'Space Grotesk',sans-serif; font-size:10.5px; font-weight:600; color:var(--ink-soft); margin:0 6px 3px; text-transform:uppercase; letter-spacing:0.5px; }
  .chat-bubble{
    font-family:'Space Grotesk',sans-serif; font-size:14.5px; line-height:1.42; color:var(--ink);
    padding:9px 13px; border-radius:15px; border:1.5px solid rgba(49,48,43,0.35);
  }
  .chat-bubble-row.me .chat-bubble{ background:var(--gold-soft); border-color:rgba(184,145,44,0.55); border-radius:15px 15px 4px 15px; }
  .chat-bubble-row.them .chat-bubble{ background:var(--paper); border-radius:15px 15px 15px 4px; }
  .chat-media{
    font-family:'Kalam',cursive; font-size:12.5px; color:var(--ink-soft);
    border:1.5px dashed rgba(49,48,43,0.4); border-radius:12px; padding:8px 12px; margin-top:2px;
  }
  .chat-time{ font-size:10px; color:var(--ink-soft); opacity:0.75; margin:2px 6px 0; }
  .chat-footer{
    padding:14px 20px 18px; border-top:2px solid rgba(49,48,43,0.15);
    display:flex; justify-content:center;
  }
  .reroll-btn{
    cursor:pointer; background:var(--paper); border:2px solid var(--ink); border-radius:20px;
    padding:9px 20px; font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:13.5px;
    color:var(--ink); display:flex; align-items:center; gap:7px;
    box-shadow:2px 2px 0 rgba(49,48,43,0.15); transition:transform .15s ease, background .15s ease;
  }
  .reroll-btn:hover{ transform:translate(-1px,-1px); background:#F2EDDF; }
  .reroll-btn:active{ transform:translate(1px,1px); box-shadow:0 0 0 rgba(0,0,0,0); }

  .label-text{
    font-family:'Playfair Display', serif; font-weight:600; pointer-events:none;
    paint-order:stroke; stroke:var(--paper); stroke-width:5px; stroke-linejoin:round;
  }
  .sub-label{
    font-family:'Playfair Display', serif; font-weight:500; font-style:italic; pointer-events:none;
    paint-order:stroke; stroke:var(--paper); stroke-width:4px; stroke-linejoin:round;
  }
  .node-hit{cursor:pointer;}
  .node-hit:hover .node-dot{ transform-origin:center; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>

  #introOverlay{
    --bg:#EDE7D8; /* matches tree homepage's --paper color */
    --ink:#241016;
    --card:#fffdf8;
    --rose:#b8677c;
    --rose-dark:#8f4f63;
    --gold:#c98a3e;
    --shadow: 0 14px 30px rgba(36,16,22,.16);
    position:fixed; inset:0; z-index:9999;
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--ink);
    font-family:'Montserrat',sans-serif; overflow:hidden;
    transition:opacity .6s ease;
  }
  #introOverlay.fade-out{ opacity:0; pointer-events:none; }
  #introOverlay *{box-sizing:border-box;}

  .view{position:fixed;inset:0;display:none;flex-direction:column;}
  .view.active{display:flex;}

  /* ================= VIEW 1: QUOTE + CHAT ================= */
  #view-chat #quote{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    padding:6vw 8vw;text-align:center;
  }
  #quote p{
    font-family:'Fraunces',serif;
    font-weight:500;
    color:var(--ink);
    font-size:clamp(1.5rem,4.3vw,2.6rem);
    line-height:1.4;
    margin:0;
    filter:blur(14px);
    opacity:0;
    transition:filter 2s ease, opacity 2s ease;
  }
  #quote p.sharp{filter:blur(0);opacity:1;}
  #quote .author{
    display:block;margin-top:1.1rem;font-style:italic;color:var(--rose-dark);
    font-family:'Fraunces',serif;
    font-size:clamp(.95rem,2vw,1.25rem);
    filter:blur(14px);opacity:0;transition:filter 2s ease .3s, opacity 2s ease .3s;
  }
  #quote .author.sharp{filter:blur(0);opacity:1;}

  #view-chat #dock-row{
    position:absolute;left:0;right:0;bottom:6vh;
    display:flex;justify-content:flex-start;align-items:flex-end;
    gap:1.1rem;padding:0 6vw;cursor:pointer;visibility:hidden;
  }
  #view-chat #intro-hint{
    position:absolute;left:0;right:0;bottom:1.6vh;
    text-align:center;font-size:.68rem;letter-spacing:.12em;color:var(--rose-dark);
    text-transform:uppercase;opacity:.7;animation:pulse 1.6s infinite ease-in-out;
    visibility:hidden;
  }
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.85}}

  /* ================= SHARED: SUPPI + BUBBLE ================= */
  .suppi-wrap img{
    width:clamp(127px,18vw,195px);
    aspect-ratio:1/1;
    display:block;
    filter:drop-shadow(0 12px 16px rgba(36,16,22,.28));
  }
  .bubble{
    position:relative;
    background:var(--card);
    color:var(--ink);
    border:3px solid var(--rose);
    border-radius:20px;
    padding:1.3rem 1.5rem;
    max-width:min(70vw,600px);
    min-width:190px;
    font-family:'Silkscreen',monospace;
    font-size:clamp(.82rem,2.3vw,1.12rem);
    line-height:1.8;
    box-shadow:var(--shadow);
  }
  .bubble.arrow-left::before{
    content:'';position:absolute;left:-14px;bottom:20px;width:22px;height:22px;
    background:var(--card);border-left:3px solid var(--rose);border-bottom:3px solid var(--rose);
    transform:rotate(45deg);border-radius:0 0 0 4px;
  }
  .bubble.arrow-right::before{
    content:'';position:absolute;right:-14px;bottom:20px;width:22px;height:22px;
    background:var(--card);border-right:3px solid var(--rose);border-top:3px solid var(--rose);
    transform:rotate(45deg);border-radius:0 4px 0 0;
  }
  .cursor{display:inline-block;width:.5em;background:var(--rose-dark);margin-left:2px;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* ================= VIEW 2: STATS ================= */
  #view-stats{padding:4vh 6vw 3vh;overflow:hidden;}
  #stats-body{
    position:relative;z-index:1;
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow-y:auto;min-height:0;gap:1.4rem;padding:1vh 0;
  }
  #cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:1.4rem;width:100%;max-width:960px;
  }
  .card{
    background:var(--card);
    border:1px solid #e7d9c2;
    border-radius:16px;
    padding:1.9rem 1.3rem;
    text-align:center;
    box-shadow:0 6px 16px rgba(36,16,22,.08);
    opacity:0;transform:translateY(14px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .card.show{opacity:1;transform:translateY(0);}
  .card .num{font-family:'Montserrat',sans-serif;font-weight:700;font-size:clamp(1.9rem,4.4vw,2.7rem);color:var(--gold);}
  .card .label{margin-top:.45rem;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--rose-dark);}

  #stats-dock{
    position:relative;z-index:1;
    flex:0 0 auto;
    display:flex;justify-content:flex-end;align-items:flex-end;
    gap:1.1rem;padding:1.6vh 0 0;
  }
  #stats-hint{
    position:relative;z-index:1;
    text-align:center;font-size:.68rem;letter-spacing:.12em;color:var(--rose-dark);
    text-transform:uppercase;opacity:0;transition:opacity .4s ease;
    pointer-events:none;padding-top:.6vh;
  }
  #stats-hint.show{opacity:.7;animation:pulse 1.6s infinite ease-in-out;}

  @media (max-width:640px){
    #view-chat #dock-row{flex-direction:column-reverse;align-items:flex-start;gap:.7rem;}
    #stats-dock{flex-direction:column;align-items:flex-end;gap:.7rem;}
    .bubble{max-width:86vw;}
    .bubble.arrow-left::before,.bubble.arrow-right::before{display:none;}
  }

  /* larger stat cards on desktop — mobile keeps the sizing above */
  @media (min-width:641px){
    #cards{
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:2rem;max-width:1200px;
    }
    .card{padding:2.8rem 2rem;}
    .card .num{font-size:clamp(2.6rem,5vw,3.6rem);}
    .card .label{font-size:.92rem;margin-top:.7rem;}
  }
  #suppi-widget{
    position:fixed; right:22px; bottom:22px; z-index:12;
    display:flex; flex-direction:column; align-items:flex-end; gap:8px;
    pointer-events:none;
  }
  #suppi-face{
    width:78px; height:78px; border-radius:50%; object-fit:cover;
    border:2px solid #31302B; background:#E6DFCC;
    box-shadow:0 6px 16px rgba(49,48,43,0.28);
    transform:scale(1);
    transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
    opacity:0.85;
  }
  #suppi-widget.active #suppi-face{ transform:scale(1.35); opacity:1; }
  #suppi-speech{
    max-width:230px;
    background:#E6DFCC; border:1.5px solid #31302B; border-radius:14px 14px 4px 14px;
    padding:9px 13px; font-family:'Kalam',cursive; font-size:13.5px; color:#31302B;
    box-shadow:2px 2px 0 rgba(49,48,43,0.15);
    opacity:0; transform:translateY(6px) scale(0.95);
    transition:opacity .3s ease, transform .3s ease;
  }
  #suppi-speech.show{ opacity:1; transform:translateY(0) scale(1); }

  @media (max-width:640px){
    #suppi-widget{ right:14px; bottom:14px; }
    #suppi-face{ width:62px; height:62px; }
    #suppi-widget.active #suppi-face{ transform:scale(1.3); }
    #suppi-speech{ max-width:180px; font-size:12.5px; }
  }
</style>
</head>

<div id="introOverlay">
<div class="view active" id="view-chat">
  <div id="quote">
    <div>

</div>
</div>



<div class="hud">
  <div class="brand"><img src="assets/logo.png" alt="Certified Besties Unwrapped" class="brand-logo"><small>five years, branch by branch</small></div>
  <div class="breadcrumb" id="breadcrumb"></div>

</div>

</div>

<div id="stage">
  <svg id="svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.03" numOctaves="2" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="roughSoft" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.04" numOctaves="2" seed="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <g id="world"></g>
  </svg>
</div>
<div class="backdrop" id="backdrop"></div>
<div class="modal-wrap" id="modalWrap">
  <div class="chat-modal">
    <div class="chat-header">
      <div>
        <div class="chat-header-title" id="chatTitle"></div>
        <div class="chat-header-sub" id="chatSub"></div>
      </div>
      <div class="chat-close" id="chatClose">✕</div>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-footer">
      <div class="reroll-btn" id="rerollBtn">↻ show another moment</div>
    </div>
  </div>
</div>

<script>
/* ---------------- data (loaded from data.json at runtime) ---------------- */
let DATA = null;
let META = { years:"—", messages:"—" };
let CATEGORIES = [];
let SPECIALS = [];
let CHAT_NAMES = ['A', 'B'];
let dataReady = false;

/* Mobile performance: the SVG feTurbulence/feDisplacementMap "hand-drawn" filters are
   very expensive to recompute per frame on mobile GPUs, and drawMain rebuilds every
   animating branch's filtered DOM each frame during the bloom — that's the main cause
   of jank on phones. On mobile we skip these filters entirely. The branch geometry
   already has organic hand-jitter baked into branchPath(), so the look degrades
   gracefully (slightly cleaner lines) rather than looking flat/wrong.
   Also gate the CSS blur on the modal backdrop, another per-frame-expensive effect. */
const IS_MOBILE = (typeof window !== 'undefined') &&
  (window.matchMedia && window.matchMedia('(max-width: 820px), (pointer: coarse)').matches);

// Applies a roughen filter only on desktop; no-op on mobile.
function applyRough(el, filterId){
  if(!IS_MOBILE) el.setAttribute('filter', filterId);
}

/* Base URL for media files. Leave as 'media/' to serve from a local folder next to
   this file. To host media remotely (recommended once your media folder gets large —
   e.g. Cloudflare R2, since GitHub Pages caps individual files at 100MB and strongly
   discourages repos over ~1GB), change this to your bucket's public URL, e.g.:
   const MEDIA_BASE = 'https://media.yoursite.com/'; */
const MEDIA_BASE = 'media/';

function hash(str){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))|0;} return Math.abs(h); }
function rand(seed){ const x = Math.sin(seed*9999.123)*43758.5453; return x-Math.floor(x); }

/* Each category/special carries a real .subtopics array (attached in buildFromData
   below), each subtopic = { name, count, window_ids }. */
function subtopicsFor(cat){ return cat.subtopics || []; }

/* Parses one window's real transcript text ("[HH:MM] Sender: message (attached: file)")
   into the {sender, text, media, time} shape renderChat() expects. Multi-line
   continuation lines (no leading [HH:MM]) get folded into the previous message. */
function parseWindowText(text){
  const lineRe = /^\[(\d{2}:\d{2})\]\s([^:]+):\s?(.*)$/;
  const attachRe = /\(attached:\s*([^)]+)\)\s*$/;
  const raw = text.split('\n');
  const out = [];
  raw.forEach(rawLine=>{
    const m = rawLine.match(lineRe);
    if(m){
      let [, time, sender, rest] = m;
      let media = null;
      const am = rest.match(attachRe);
      if(am){ media = am[1].trim(); rest = rest.replace(attachRe,'').trim(); }
      const senderIdx = CHAT_NAMES.indexOf(sender.trim())===1 ? 1 : 0;
      out.push({ sender: senderIdx, text: rest, media, time });
    } else if(out.length){
      out[out.length-1].text += (out[out.length-1].text? '\n':'') + rawLine;
    }
  });
  return out;
}

/* Picks a real window id from a subtopic's window_ids, avoiding immediate repeats. */
function pickWindowId(windowIds, avoidId){
  if(windowIds.length===1) return windowIds[0];
  let choice, attempts=0;
  do { choice = windowIds[Math.floor(Math.random()*windowIds.length)]; attempts++; }
  while(choice===avoidId && attempts<10);
  return choice;
}

/* Turns the exported data.json into the CATEGORIES / SPECIALS / CHAT_NAMES / META
   this file's rendering code expects. Called once, after fetch('data.json') resolves. */
function buildFromData(data){
  DATA = data;
  CHAT_NAMES = data.meta.senders && data.meta.senders.length===2 ? data.meta.senders : ['A','B'];

  const years = 6; // hardcoded per request (was computed as ~5.3 from actual dates)
  META = { years, messages: data.meta.total_messages.toLocaleString() };

  CATEGORIES = data.bubbles.map(b=>({
    emoji: b.emoji, name: b.name, count: b.count,
    subtopics: b.subtopics.map(s=>({ name: s.name, count: s.count, window_ids: s.window_ids })),
  }));

  const specialMeta = {
    arguments: { emoji:'⚡', name:'Arguments', kind:'argue' },
    cherished_moments: { emoji:'❤️', name:'Cherished Moments', kind:'cherish' },
  };
  SPECIALS = Object.entries(data.significant_moments||{}).map(([category, items])=>{
    const m = specialMeta[category] || { emoji:'⭐', name:category, kind:'cherish' };
    return {
      emoji:m.emoji, name:m.name, kind:m.kind, count: items.length,
      subtopics: [{ name:'Top moments', count: items.length, window_ids: items.map(it=>it.window_id) }],
    };
  });
}

/* ---------------- spring engine ---------------- */
class Spring{
  constructor(value, stiffness=140, damping=12, mass=1){
    this.pos=value; this.vel=0; this.target=value;
    this.k=stiffness; this.c=damping; this.m=mass;
  }
  set(target){ this.target=target; }
  snap(value){ this.pos=value; this.target=value; this.vel=0; }
  update(dt){
    const acc = ( (this.target-this.pos)*this.k - this.vel*this.c ) / this.m;
    this.vel += acc*dt;
    this.pos += this.vel*dt;
    return this.pos;
  }
  atRest(posEps=0.01, velEps=posEps){ return Math.abs(this.target-this.pos)<posEps && Math.abs(this.vel)<velEps; }
}

/* ---------------- geometry setup ---------------- */
const W=1000, H=1000;
const trunkBase = {x: W/2, y: H+90};
const hub = {x: W/2, y: H+30};

const svgns = "http://www.w3.org/2000/svg";
const world = document.getElementById('world');

// build angle layout: specials at far edges, categories filling the arc between
const arcStart = 168, arcEnd = 372; // degrees, 270 = straight up

let branches = []; // all branch descriptors (main level) — populated in buildBranches()

function buildBranches(){
  const total = CATEGORIES.length;
  function angleForIndex(i){
    const t = total===1? 0.5 : i/(total-1);
    return arcStart + t*(arcEnd-arcStart);
  }

  // CATEGORIES arrives sorted biggest-count-first (from the data export). Since
  // angleForIndex maps array position directly to left->right position, using that
  // order as-is would put every big (long) branch on the left and every small (short)
  // branch on the right — exactly the "right side looks pulled inward" effect. Instead,
  // interleave big/small alternately so branch length varies across the whole arc.
  const orderedCategories = [];
  { let lo = 0, hi = CATEGORIES.length - 1, takeLo = true;
    while (lo <= hi) {
      if (takeLo) orderedCategories.push(CATEGORIES[lo++]);
      else orderedCategories.push(CATEGORIES[hi--]);
      takeLo = !takeLo;
    }
  }

  branches = [];
  SPECIALS.forEach((s,i)=>{
    branches.push({
      ...s, isSpecial:true,
      angle: i===0? 242.5 : 297.5, // near the top of the fan — 55° apart (was 70°, which pushed them behind other nodes)
      len: (620 + Math.min(220, s.count*0.85)) * 1.4,
    });
  });
  orderedCategories.forEach((c,i)=>{
    const jitter = 0.78 + rand(hash(c.name) + 3.14) * 0.6; // organic per-bubble length variation, ~0.78x-1.38x, deterministic per bubble (same name -> same jitter every load)
    branches.push({
      ...c, isSpecial:false,
      angle: angleForIndex(i),
      len: (340 + Math.min(260, c.count*0.55)) * 1.55 * jitter,
    });
  });
}

function polar(cx,cy,angleDeg,r){
  const a = angleDeg*Math.PI/180;
  return { x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r };
}

/* compute a tight bounding view around every node (used for the aggressive
   post-bloom auto-zoom, on both desktop and mobile). view.half tracks
   half-HEIGHT in world units; half-width is derived from the real screen
   aspect ratio so the crop is tight on both portrait phones and wide
   desktops, instead of forcing a square viewBox that letterboxes badly. */

/* ---- tune the aggressive auto-zoom here ----
   FIT_ZOOM: <1 = tighter/closer, >1 = looser/further out
   FIT_VERTICAL_SHIFT: world-unit offset applied to the focus point after
     fitting — negative moves the "camera" up (shows more of the branch tips,
     less trunk), positive moves it down (shows more trunk/base) */
const FIT_ZOOM = 0.78;
const FIT_VERTICAL_SHIFT = -160;

function computeFitView(padding=34){
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  branches.forEach(b=>{
    const tip = polar(hub.x, hub.y, b.angle, b.len);
    const r = b.isSpecial? 50: 40;
    minX = Math.min(minX, tip.x-r);
    maxX = Math.max(maxX, tip.x+r);
    minY = Math.min(minY, tip.y-r-64); // leave room for the label above/around the node
    maxY = Math.max(maxY, tip.y+r+64);
  });
  minY = Math.min(minY, hub.y-30);
  maxY = Math.max(maxY, trunkBase.y-20);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2 + FIT_VERTICAL_SHIFT;
  // fit tightly to the vertical extent only — on narrow/portrait screens this
  // intentionally crops the outer left/right branches (aggressive, close-up
  // framing); free pinch/pan lets you explore the rest.
  const half = ((maxY-minY)/2 + padding) * FIT_ZOOM;
  return {cx, cy, half};
}

/* jittered hand-drawn branch path (quadratic, with per-branch deterministic wobble) */
function branchPath(origin, tip, seed){
  const mx = (origin.x+tip.x)/2, my=(origin.y+tip.y)/2;
  const dx = tip.x-origin.x, dy = tip.y-origin.y;
  const len = Math.hypot(dx,dy)||1;
  const nx = -dy/len, ny = dx/len;
  const bend = (rand(seed)-0.5) * len*0.35;
  const cx = mx + nx*bend, cy = my + ny*bend;
  return `M ${origin.x.toFixed(1)} ${origin.y.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${tip.x.toFixed(1)} ${tip.y.toFixed(1)}`;
}

function colorFor(b){
  if(b.kind==='cherish') return {stroke:'var(--gold)', fill:'var(--gold-soft)'};
  if(b.kind==='argue') return {stroke:'var(--brick)', fill:'var(--brick-soft)'};
  return {stroke:'var(--ink)', fill:'var(--paper2)'};
}

/* ---------------- render loop ---------------- */
let last = performance.now();
let looping = false;
let forceRedrawAll = false; // set true for one pass whenever activeMain changes,
                             // so every branch's dim/undim state updates immediately

function wake(){
  if(looping) return;
  looping = true;
  last = performance.now();
  requestAnimationFrame(frame);
}

function frame(now){
  const dt = Math.min(0.032, (now-last)/1000);
  last = now;

  const viewSettled = view.cx.atRest(0.05,0.3) && view.cy.atRest(0.05,0.3) && view.half.atRest(0.05,0.3);
  if(!viewSettled){
    view.cx.update(dt); view.cy.update(dt); view.half.update(dt);
  }
  applyViewBox();

  const redrawAllThisFrame = forceRedrawAll;
  forceRedrawAll = false;

  let anyBranchAnimating = false;
  mainState.forEach((st,i)=>{
    const wasSettled = st.growth.atRest(0.01, 0.3) && st.openT.atRest(0.01, 0.3);
    if(!wasSettled){
      st.growth.update(dt);
      st.openT.update(dt);
      anyBranchAnimating = true;
    }
    const stillAnimating = !st.growth.atRest(0.01, 0.3) || !st.openT.atRest(0.01, 0.3);
    if(stillAnimating || !st.everDrawn || redrawAllThisFrame){
      drawMain(st, mainGroups[i]);
      st.everDrawn = true;
    }
  });

  if(!viewSettled || anyBranchAnimating){
    requestAnimationFrame(frame);
  } else {
    looping = false; // fully at rest — stop looping until something wakes us again
  }
}
wake();

/* ---------------- drawing ---------------- */
function drawMain(st, g){
  const b = st.def;
  const seedBase = hash(b.name);
  const growth = st.growth.pos; // 0..1, can overshoot slightly beyond 1 due to spring
  const clampedLen = b.len * Math.max(0, growth<1? growth : 1 + (growth-1)*0.0); // keep tip stable, overshoot handled via scale wobble below
  const drawLen = b.len * Math.max(0.001, growth);
  const tip = polar(hub.x, hub.y, b.angle, Math.min(drawLen, b.len*1.15));
  const col = colorFor(b);

  g.innerHTML = '';
  if(growth<0.005 && st.openT.pos<0.005){ return; }

  const isDimmed = activeMain!==null && st.idx!==activeMain;
  const dimMul = isDimmed ? 0.22 : 1;
  g.style.pointerEvents = isDimmed ? 'none' : 'auto'; // dimmed branches can't steal clicks meant for the open branch's subtopics

  const wrap = document.createElementNS(svgns,'g');
  applyRough(wrap, b.isSpecial? 'url(#rough)' : 'url(#roughSoft)');

  const p1 = document.createElementNS(svgns,'path');
  p1.setAttribute('d', branchPath(hub, tip, seedBase));
  p1.setAttribute('stroke', col.stroke);
  p1.setAttribute('stroke-width', b.isSpecial? 9 : 6.5);
  p1.setAttribute('fill','none');
  p1.setAttribute('stroke-linecap','round');
  p1.setAttribute('opacity', Math.min(1, growth+0.15)*dimMul);
  wrap.appendChild(p1);

  const p2 = document.createElementNS(svgns,'path');
  p2.setAttribute('d', branchPath(hub, tip, seedBase+5.5));
  p2.setAttribute('stroke', col.stroke);
  p2.setAttribute('stroke-width', 1.6);
  p2.setAttribute('fill','none');
  p2.setAttribute('opacity', 0.35*Math.min(1,growth+0.1)*dimMul);
  wrap.appendChild(p2);

  g.appendChild(wrap);

  // node (bud) at tip
  if(growth>0.55){
    const nodeOpacity = Math.min(1, (growth-0.55)/0.3);
    const scale = 1 + Math.max(0, (growth-1))*1.4; // slight pop on overshoot
    const nodeG = document.createElementNS(svgns,'g');
    nodeG.setAttribute('class','node-hit');
    nodeG.setAttribute('data-branch-idx', st.idx);
    nodeG.setAttribute('transform', `translate(${tip.x} ${tip.y}) scale(${scale})`);
    nodeG.style.opacity = nodeOpacity*dimMul;
    nodeG.style.cursor='pointer';

    const r = b.isSpecial? 50: 40;
    const labelDy = st.idx===activeMain? 38 : 30;

    // invisible hit area covering the circle + its label, so taps on the
    // (much bigger) text register too, instead of falling through to empty canvas
    const hitArea = document.createElementNS(svgns,'rect');
    hitArea.setAttribute('x', -(r+55));
    hitArea.setAttribute('y', -(r+8));
    hitArea.setAttribute('width', (r+55)*2);
    hitArea.setAttribute('height', r+labelDy+30);
    hitArea.setAttribute('fill','transparent');
    hitArea.setAttribute('pointer-events','all');
    nodeG.appendChild(hitArea);

    const circ = document.createElementNS(svgns,'circle');
    circ.setAttribute('r', r);
    circ.setAttribute('fill', col.fill);
    circ.setAttribute('stroke', col.stroke);
    circ.setAttribute('stroke-width', st.idx===activeMain? 5 : 3.5);
    applyRough(circ, 'url(#roughSoft)');
    nodeG.appendChild(circ);

    // label underneath the node, always visible, in serif — now a child of
    // nodeG so it's covered by the same hit area and data-branch-idx lookup
    const label = document.createElementNS(svgns,'text');
    label.setAttribute('class','label-text');
    label.setAttribute('x', 0);
    label.setAttribute('y', r + labelDy);
    label.setAttribute('text-anchor','middle');
    label.setAttribute('font-size', st.idx===activeMain? 30 : 19);
    label.setAttribute('fill', col.stroke);
    label.textContent = b.name;
    nodeG.appendChild(label);

    g.appendChild(nodeG);
  }

  // subtopics, only for the active/open branch — driven by its own openT spring
  if(st.openT.pos>0.005){
    const subDefs = subtopicsFor(b);
    const n = subDefs.length;
    const subGrowth = st.openT.pos;
    const spread = Math.min(320, 90 + n*10); // widen the fan for branches with many subtopics, so labels don't crowd/overlap
    subDefs.forEach((sd, si)=>{
      const t = n===1? 0.5: si/(n-1);
      const subAngle = b.angle - spread/2 + t*spread;
      const subSeed = seedBase + si*3.1;
      const jitter = 0.72 + rand(subSeed + 50.7) * 0.68; // organic per-subtopic length variation, ~0.72x-1.4x, deterministic per subtopic so it doesn't reshuffle on redraw
      const subLen = (190 + Math.min(260, sd.count*0.8)) * jitter;
      // stagger delay via easing offset
      const staggerDelay = Math.min(0.7, si*0.06); // cap so late subtopics don't get an absurdly steep ramp
      const localT = Math.max(0, Math.min(1,(subGrowth - staggerDelay)/(1-staggerDelay+0.0001)));
      const eased = easeOutElastic(localT);
      const subTip = polar(tip.x, tip.y, subAngle, subLen*eased);

      const sg = document.createElementNS(svgns,'g');
      applyRough(sg, 'url(#roughSoft)');
      sg.style.opacity = Math.min(1, localT*1.4);

      const sp = document.createElementNS(svgns,'path');
      sp.setAttribute('d', branchPath(tip, subTip, subSeed));
      sp.setAttribute('stroke', col.stroke);
      sp.setAttribute('stroke-width', 5);
      sp.setAttribute('fill','none');
      sp.setAttribute('stroke-linecap','round');
      sg.appendChild(sp);
      g.appendChild(sg);

      if(localT>0.5){
        const dotG = document.createElementNS(svgns,'g');
        dotG.setAttribute('data-sub-parent', st.idx);
        dotG.setAttribute('data-sub-index', si);
        dotG.setAttribute('transform', `translate(${subTip.x} ${subTip.y})`);
        dotG.style.opacity = Math.min(1,(localT-0.5)*2);
        dotG.style.cursor='pointer';

        const subHit = document.createElementNS(svgns,'rect');
        subHit.setAttribute('x', -70);
        subHit.setAttribute('y', -20);
        subHit.setAttribute('width', 140);
        subHit.setAttribute('height', 40);
        subHit.setAttribute('fill','transparent');
        subHit.setAttribute('pointer-events','all');
        dotG.appendChild(subHit);

        const dot = document.createElementNS(svgns,'circle');
        dot.setAttribute('r', 19);
        dot.setAttribute('fill', col.fill);
        dot.setAttribute('stroke', col.stroke);
        dot.setAttribute('stroke-width', 3);
        dotG.appendChild(dot);

        const stxt = document.createElementNS(svgns,'text');
        stxt.setAttribute('class','sub-label');
        stxt.setAttribute('text-anchor', subAngle>270? 'start':'end');
        stxt.setAttribute('x', subAngle>270? 24: -24);
        stxt.setAttribute('dy', 6);
        stxt.setAttribute('font-size', 18);
        stxt.setAttribute('fill', 'var(--ink-soft)');
        stxt.textContent = sd.name;
        dotG.appendChild(stxt);

        g.appendChild(dotG);
      }
    });
  }
}

function easeOutElastic(x){
  if(x<=0) return 0;
  if(x>=1) return 1;
  const c4 = (2*Math.PI)/3.2;
  return Math.pow(2,-8*x) * Math.sin((x*7-0.75)*c4) + 1;
}

/* ---------------- free explore: pinch-zoom & drag-pan (tree only, not the page) ---------------- */
const MIN_HALF = 140, MAX_HALF = 1600;
const pointers = new Map();
let gesture = null;
let suppressNextClick = false;

function svgRect(){ return svgEl.getBoundingClientRect(); }
function aspectFor(){ const r=svgRect(); return (r.width>0 && r.height>0) ? r.width/r.height : 1; }
function drawScaleFor(halfH){ const r=svgRect(); return r.height/(halfH*2); }
function screenToWorld(px,py,cx,cy,halfH){
  const r = svgRect();
  const aspect = aspectFor();
  const halfW = halfH*aspect;
  const scale = r.height/(halfH*2);
  return { x: (cx-halfW) + (px-r.left)/scale, y: (cy-halfH) + (py-r.top)/scale };
}

function startPinch(){
  const pts = [...pointers.values()];
  gesture = {
    mode:'pinch',
    startDist: Math.max(1, Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y)),
    startHalf: view.half.pos,
    startWorld: screenToWorld((pts[0].x+pts[1].x)/2, (pts[0].y+pts[1].y)/2, view.cx.pos, view.cy.pos, view.half.pos),
  };
}
function startPan(e){
  gesture = { mode:'pan', startX:e.clientX, startY:e.clientY, startCx:view.cx.pos, startCy:view.cy.pos, moved:false };
}

svgEl.addEventListener('pointerdown', (e)=>{
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pointers.size===2){
    startPinch();
    pointers.forEach((_,id)=>{ try{ svgEl.setPointerCapture(id); }catch(err){} });
  } else if(pointers.size===1) startPan(e);
});

svgEl.addEventListener('pointermove', (e)=>{
  if(!pointers.has(e.pointerId)) return;
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});

  if(pointers.size===2 && gesture && gesture.mode==='pinch'){
    const pts = [...pointers.values()];
    const dist = Math.max(1, Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y));
    const newHalf = Math.min(MAX_HALF, Math.max(MIN_HALF, gesture.startHalf * (gesture.startDist/dist)));
    const curMid = {x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    const r = svgRect();
    const aspect = aspectFor();
    const newHalfW = newHalf*aspect;
    const scale = drawScaleFor(newHalf);
    const newCx = gesture.startWorld.x - (curMid.x-r.left)/scale + newHalfW;
    const newCy = gesture.startWorld.y - (curMid.y-r.top)/scale + newHalf;
    view.half.snap(newHalf);
    view.cx.snap(newCx);
    view.cy.snap(newCy);
    gesture.moved = true;
    e.preventDefault();
    wake();
  } else if(pointers.size===1 && gesture && gesture.mode==='pan'){
    const dx = e.clientX-gesture.startX, dy = e.clientY-gesture.startY;
    if(!gesture.moved && Math.hypot(dx,dy)>9){
      gesture.moved = true;
      try{ svgEl.setPointerCapture(e.pointerId); }catch(err){}
    }
    if(!gesture.moved) return; // still just a tap-in-progress — don't pan yet
    const scale = drawScaleFor(view.half.pos);
    view.cx.snap(gesture.startCx - dx/scale);
    view.cy.snap(gesture.startCy - dy/scale);
    e.preventDefault();
    wake();
  }
});

function endPointer(e){
  pointers.delete(e.pointerId);
  try{ svgEl.releasePointerCapture(e.pointerId); }catch(err){}
  if(gesture && gesture.moved) suppressNextClick = true;
  if(pointers.size===2) startPinch();
  else if(pointers.size===1) startPan({clientX:[...pointers.values()][0].x, clientY:[...pointers.values()][0].y});
  else gesture = null;
}
svgEl.addEventListener('pointerup', endPointer);
svgEl.addEventListener('pointercancel', endPointer);

/* desktop trackpad / mouse-wheel zoom, anchored at the cursor */
svgEl.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const zoomFactor = Math.exp(e.deltaY*0.0038);
  const newHalf = Math.min(MAX_HALF, Math.max(MIN_HALF, view.half.pos*zoomFactor));
  const world = screenToWorld(e.clientX, e.clientY, view.cx.pos, view.cy.pos, view.half.pos);
  const r = svgRect();
  const aspect = aspectFor();
  const newHalfW = newHalf*aspect;
  const scale = drawScaleFor(newHalf);
  const newCx = world.x - (e.clientX-r.left)/scale + newHalfW;
  const newCy = world.y - (e.clientY-r.top)/scale + newHalf;
  view.half.set(newHalf);
  view.cx.set(newCx);
  view.cy.set(newCy);
  wake();
}, {passive:false});

/* click delegation — handles branch nodes, subtopic dots, and empty space reliably
   even though the tree redraws every frame (avoids stale/removed listeners) */
svgEl.addEventListener('click', (e)=>{
  if(suppressNextClick){ suppressNextClick=false; return; }
  const branchEl = e.target.closest('[data-branch-idx]');
  if(branchEl){
    openMain(parseInt(branchEl.getAttribute('data-branch-idx'), 10));
    return;
  }
  const subEl = e.target.closest('[data-sub-parent]');
  if(subEl){
    const pIdx = parseInt(subEl.getAttribute('data-sub-parent'), 10);
    const sIdx = parseInt(subEl.getAttribute('data-sub-index'), 10);
    openChatModal(pIdx, sIdx);
    return;
  }
  goHome();
});

/* ---------------- boot: runs once, after data.json has loaded ---------------- */
function boot(){
  buildBranches();

  mainState = branches.map((b,idx)=>({
    def:b, idx,
    growth: new Spring(0, 90, 11), // 0 -> 1, initial bloom-in
    openT: new Spring(0, 120, 15),  // 0 -> 1, subtopic reveal (elastic, independent of growth)
  }));

  mainGroups = [];
  mainState.forEach((st)=>{
    const g = document.createElementNS(svgns,'g');
    g.classList.add('main-branch');
    world.appendChild(g);
    mainGroups.push(g);
  });

  const brandSmall = document.querySelector('.brand small');
  if(brandSmall) brandSmall.textContent = `${META.years} years, branch by branch`;

  const suppiFace = document.getElementById('suppi-face');
  if(suppiFace) suppiFace.src = suppiFaceSrc();

  renderBreadcrumb();

  /* initial camera — start wide enough to watch the bloom happen */
  view.cx.snap(W/2); view.cy.snap(H/2-190); view.half.snap(1150);

  /* grow all main branches in on load, staggered */
  mainState.forEach((st,i)=>{
    setTimeout(()=>{ st.growth.set(1); wake(); }, 150 + i*35);
  });

  /* once the bloom has finished, snap aggressively tight to every node —
     on both desktop and mobile */
  const bloomDuration = 150 + CATEGORIES.length*35 + 850;
  setTimeout(()=>{
    if(activeMain===null){
      const fit = computeFitView();
      view.cx.set(fit.cx);
      view.cy.set(fit.cy);
      view.half.set(fit.half);
      wake();
    }
  }, bloomDuration);

  dataReady = true;
}

/* Not auto-invoked: the intro sequence (see intro overlay markup/script above,
   when present) calls window.startTreeApp() once it finishes, so the bloom-in
   animation plays fresh right after the intro fades out rather than running
   hidden behind it. If this file is ever used standalone (no intro overlay),
   nothing calls this automatically — see the fallback check at the bottom. */
function startTreeApp(){
  fetch('data.json')
    .then(r=>r.json())
    .then(data=>{
      buildFromData(data);
      boot();
    })
    .catch(err=>{
      hintEl.textContent = 'Could not load data.json — make sure it sits next to index.html and you are running a local server (see README).';
      hintEl.classList.add('show');
      console.error(err);
    });
}
window.startTreeApp = startTreeApp;

// Fallback: if no intro overlay exists on the page, start immediately.
if (!document.getElementById('introOverlay')) {
  startTreeApp();
}

const chatLines = [
  { img:'happy', text:`Such a great quote by Osho. Isn't it?` },
  { img:'happy', text:`Arreeee beta.... Kab tak HEP karoge? Take a chill pill. Adi hai na. And don't worry beta, maine uska move on karwa diya hai` },
  { img:'sad',   text:`Advit, if you are reading this then why are you here?` },
  { img:'happy', text:`Just kidding, you are also welcome here :)` },
  { img:'happy', text:`So beta, lets get started with "Certified Besties, Unwrapped"` },
];

const statsLine = { img:'think', text:`Damm!! These are better stats than your Friday presentations beta!` };

const stats = [
  { num:'6+', label:'years of chaos' },
  { num:'78,344', label:'messages sent' },
  { num:'~5,000', label:'moments unwrapped' },
  { num:'8,700+', label:'photos & videos' },
];

const typingSound = document.getElementById('typingSound');

function typeInto(el, text, speed=26){
  return new Promise(resolve=>{
    el.innerHTML = '';
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className='cursor';
    cursor.textContent='_';

    if (typingSound) {
      typingSound.currentTime = 0;
      typingSound.play().catch(()=>{});
    }

    function stopSound(){
      if (typingSound) {
        typingSound.pause();
        typingSound.currentTime = 0;
      }
    }

    function step(){
      if(i <= text.length){
        el.textContent = text.slice(0,i);
        el.appendChild(cursor);
        i++;
        setTimeout(step, speed);
      } else {
        cursor.remove();
        stopSound();
        resolve();
      }
    }
    step();
  });
}

const dockRow = document.getElementById('dock-row');
const bubble = document.getElementById('bubble');
const suppiImg = document.getElementById('suppi-img');
const hint = document.getElementById('intro-hint');
const viewChat = document.getElementById('view-chat');
const viewStats = document.getElementById('view-stats');

let idx = -1;
let typing = false;
let bgmStarted = false;
const bgm = document.getElementById('bgm');

function startBgm(){
  if (bgmStarted || !bgm) return;
  bgmStarted = true;
  bgm.volume = 0.35; // tweak to taste
  bgm.play().catch(()=>{});
}

window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('quote-text').classList.add('sharp');
    document.getElementById('quote-author').classList.add('sharp');
  }, 300);
  setTimeout(()=>{
    dockRow.style.visibility='visible';
    hint.style.visibility='visible';
    advanceChat();
  }, 5000);
  viewChat.addEventListener('click', advanceChat);
});

async function playChatLine(line){
  typing = true;
  hint.style.visibility='hidden';
  suppiImg.src = ASSETS[line.img];
  await typeInto(document.getElementById('bubble-text'), line.text);
  typing = false;
  hint.style.visibility='visible';
}

function advanceChat(){
  startBgm();
  if(typing) return;
  idx++;
  if(idx < chatLines.length){
    playChatLine(chatLines[idx]);
  } else if(idx === chatLines.length){
    viewChat.removeEventListener('click', advanceChat);
    goToStats();
  }
}

async function goToStats(){
  viewChat.classList.remove('active');
  viewStats.classList.add('active');
  document.getElementById('stats-suppi-img').src = ASSETS.think;
  await typeInto(document.getElementById('stats-bubble-text'), statsLine.text, 26);
  revealStats();
}

function revealStats(){
  const cardsEl = document.getElementById('cards');
  stats.forEach((s,i)=>{
    const c = document.createElement('div');
    c.className='card';
    c.innerHTML = `<div class="num">${s.num}</div><div class="label">${s.label}</div>`;
    cardsEl.appendChild(c);
    setTimeout(()=>c.classList.add('show'), 150 + i*140);
  });
  setTimeout(()=>{
    statsReady = true;
    const statsHint = document.getElementById('stats-hint');
    if (statsHint) statsHint.classList.add('show');
  }, 150 + stats.length*140 + 500);
}

/* ---------------- hand off to the tree homepage ---------------- */
let statsReady = false;
viewStats.addEventListener('click', ()=>{
  if(!statsReady) return;
  enterTree();
});
function enterTree(){
  statsReady = false; // prevent double-fire
  const overlay = document.getElementById('introOverlay');
  overlay.classList.add('fade-out');
  setTimeout(()=>{
    overlay.style.display = 'none';
    if (window.startTreeApp) window.startTreeApp();
  }, 650);
}
